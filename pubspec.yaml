name: aura
description: "Aura: Görünmez Audio Engine"
publish_to: 'none'
version: 1.3.0+7

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/offline_drone.mp3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21